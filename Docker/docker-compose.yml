services:
# ==============================
# LLMCore 模块搭建
# ==============================
  llmcore:
    build:
      context: ../
      dockerfile: Docker/LLMCore/${DOCKERFILE_DEVICE}
      target: product
      args:
        BUILDKIT_INLINE_CACHE: '1'
    image: llmcore:${DEVICE}-${LLMCORE_VERSION}
    container_name: llmcore
    volumes:
      - ${LLMCORE_VOLUME:-../LLMCore}:/app/LLMCore  # 动态挂载 LLMCore
      - ${GLOBAL_CONFIG_VOLUME:-../config}:/app/config
    networks:
      - mimirnet  # 统一使用自建的 MimirNet 网络通信
    ports:
      - 24910:24910
    shm_size: '16gb'
    env_file:
      - ./LLMCore/llmcore.env
    restart: unless-stopped
    command: sleep infinity
    environment:
      - DEVICE=${DEVICE}

# ==============================
# Weaviate 向量数据库 搭建
# ==============================
  weaviate:
    build:
      context: ../
      dockerfile: Docker/Weaviate/Dockerfile
      args:
        WEAVIATE_VERSION: ${WEAVIATE_VERSION}
    image: weaviate:${WEAVIATE_VERSION}
    container_name: weaviate
    volumes:
      - ${WEAVIATE_DATA_VOLUME:-./Weaviate/data}:/var/lib/weaviate
    networks:
      - mimirnet
    ports:
      - 24980:8080
      - 50052:50051
    restart: unless-stopped
    env_file:
      - ./Weaviate/weaviate.env
    command:
      - --host
      - 0.0.0.0
      - --port
      - '8080'
      - --scheme
      - http

# ==============================
# vllm + embedding 后端 搭建
# ==============================
  vllm-emb:
    build:
      context: ./vLLM-Emb
      dockerfile: Dockerfile
    environment:
      - VLLM_MODEL=/models/Qwen2.5-7B-Instruct-AWQ      # 替换为您的默认模型（容器内路径）
      - VLLM_PORT=8000
      - EMB_PORT=24101
    image: vllm-emb:${DEVICE}-${LLMCORE_VERSION}
    container_name: vllm-emb
    volumes:
      - ${LLM_MODEL_VOLUME:-../LLMCore/pretrained/models}:/models
      - ${EMBEDDING_MODEL_VOLUME:-../LLMCore/pretrained/embeddings}:/embeddings
      # - ./vLLM-Emb/emb:/emb
      # - ./vLLM-Emb/entrypoint_custom.sh:/entrypoint_custom.sh
    networks:
      - mimirnet
    entrypoint: ["/bin/bash", "/entrypoint_custom.sh"]
    ports:
      - 24102:${VLLM_PORT:-8000}    # 映射 vLLM 服务端口
      - 24101:${EMB_PORT:-24101}     # 映射嵌入模型服务端口
    restart: unless-stopped

networks:
  mimirnet:
    driver: bridge

# ./run.sh