services:
# ==============================
# LLMCore 模块搭建
# ==============================
  llmcore:
    build:
      context: ../
      dockerfile: Docker/LLMCore/Dockerfile
      target: ${BUILD_STAGE}  # 指定构建到 device.env 所检测的环境
      args:
        BUILDKIT_INLINE_CACHE: '1'
    image: llmcore:${BUILD_STAGE}-${VERSION}
    container_name: llmcore
    volumes:
      - ${LLMCORE_VOLUME:-../LLMCore}:/app/LLMCore  # 动态挂载 LLMCore
      - ${GLOBAL_CONFIG_VOLUME:-../config}:/app/config
    networks:
      - mimirnet  # 统一使用自建的 MimirNet 网络通信
    ports:
      - 24910:24910
    shm_size: '16gb'
    env_file:
      - ./LLMCore/llmcore.env
      - ./device.env
    restart: unless-stopped
    command: sleep infinity
    environment:
      - DEVICE=${DEVICE}
      - CUDA_VISIBLE_DEVICES=${USE_CUDA:+${CUDA_DEVICES}}
    deploy:  # Swarm/Kubernetes
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    runtime: ${USE_CUDA:+nvidia}  # 仅在 CUDA 可用时使用 NVIDIA Container Toolkit

# ==============================
# Weaviate 向量数据库 搭建
# ==============================
  weaviate:
    build:
      context: ../
      dockerfile: Docker/Weaviate/Dockerfile
    image: weaviate:${VERSION}
    container_name: weaviate
    volumes:
    - ${WEAVIATE_DATA_VOLUME:-./Weaviate/data}:/var/lib/weaviate
    networks:
      - mimirnet
    ports:
    - 24980:8080
    - 50052:50051
    restart: unless-stopped
    env_file:
      - ./Weaviate/weaviate.env
    command:
      - --host
      - 0.0.0.0
      - --port
      - '8080'
      - --scheme
      - http

networks:
  mimirnet:
    driver: bridge

# build.sh