services:
  llmcore:
    build:
      context: ../LLMCore
      dockerfile: ../Docker/LLMCore/Dockerfile
    image: llmcore:latest
    container_name: llmcore
    volumes:
      - ${LLMCORE_VOLUME:-../LLMCore}:/app/LLMCore  # 动态挂载 LLMCore
    networks:
      - mimirnet  # 统一使用自建的 MimirNet 网络通信
    ports:
    - 24910:24910
    # 指定使用nvidia container toolkit
    runtime: nvidia
    # 增加共享内存大小
    shm_size: '16gb'
    env_file:
      - ./LLMCore/llmcore.env
    restart: unless-stopped
    command: sleep infinity

  weaviate:
    build:
      context: ./Weaviate
      dockerfile: Dockerfile
    image: weaviate:latest
    container_name: weaviate
    volumes:
    - ${WEAVIATE_DATA_VOLUME:-./Weaviate/data}:/var/lib/weaviate  # 动态挂载 Weaviate Data
    networks:
      - mimirnet
    ports:
    - 24980:8080
    - 50052:50051
    restart: unless-stopped
    env_file:
      - ./Weaviate/weaviate.env
    command:
      - --host
      - 0.0.0.0
      - --port
      - '8080'
      - --scheme
      - http

networks:
  mimirnet:
    driver: bridge

